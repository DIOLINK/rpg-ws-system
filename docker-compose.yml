services:
  mongo:
    image: mongo:7
    container_name: rpg-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - rpg-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rpg-server
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/rpg-ws-system
      - PORT=5001
      - FRONTEND_URL=*
    depends_on:
      - mongo
    networks:
      - rpg-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ""
        VITE_API_URL: "/api"
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    container_name: rpg-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - rpg-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: rpg-ngrok
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4040:4040"
    command: "http http://client:80"
    depends_on:
      - client
    networks:
      - rpg-network

volumes:
  mongo-data:

networks:
  rpg-network:
    driver: bridge
